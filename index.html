<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria Settlement Engine v2026.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #07080c;
            --bg-panel: rgba(13, 16, 26, 0.85);
            --border-glow: rgba(56, 189, 248, 0.15);
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #f87171;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #gameViewport { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        
        #topBar {
            background: rgba(10, 11, 16, 0.9);
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        .stat-display { display: flex; gap: 28px; }
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; }
        .stat-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent-blue); }

        .era-badge {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        #canvasContainer { flex: 1; position: relative; background: #0b0c10; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #sidebar {
            width: 420px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            height: 100%;
            backdrop-filter: blur(16px);
            z-index: 10;
        }

        .sidebar-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .section-header { padding: 16px 24px; font-size: 11px; font-weight: 700; color: var(--text-primary); letter-spacing: 1.5px; text-transform: uppercase; background: rgba(255, 255, 255, 0.01); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .section-content { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }

        .inventory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .inventory-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .inv-meta { font-size: 12px; color: var(--text-secondary); }
        .inv-val { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--accent-blue); }

        .log-entry { font-family: var(--font-mono); font-size: 11px; padding: 8px 12px; border-left: 3px solid var(--accent-blue); margin-bottom: 6px; color: var(--text-secondary); background: rgba(255,255,255,0.01); }
        .log-entry.success { border-left-color: var(--accent-green); }
        .log-entry.upgrade { border-left-color: var(--accent-amber); background: rgba(251, 191, 36, 0.04); }

        .minion-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .minion-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; }
        .minion-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .minion-fill { height: 100%; }

        .control-buttons { display: flex; gap: 6px; background: rgba(255, 255, 255, 0.02); padding: 4px; border-radius: 8px; }
        button { background: transparent; color: var(--text-secondary); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        button.active, button:hover { background: var(--accent-blue); color: var(--bg-main); }
    </style>
</head>
<body>

    <div id="gameViewport">
        <div id="topBar">
            <div class="stat-display">
                <div class="stat-item"><span class="stat-label">Temporal Cycle</span><span class="stat-value" id="dayCounter">1</span></div>
                <div class="stat-item"><span class="stat-label">Population</span><span class="stat-value" id="populationCount">0</span></div>
                <div class="stat-item"><span class="stat-label">Fauna Grid</span><span class="stat-value" id="animalCount">0</span></div>
            </div>
            <div class="era-badge" id="eraDisplay">Primitive Camp</div>
            <div class="control-buttons">
                <button id="btn-pause" onclick="game.togglePause()">PAUSE</button>
                <button id="speed1" class="active" onclick="game.setGameSpeed(1)">1x</button>
                <button id="speed2" onclick="game.setGameSpeed(2)">2x</button>
                <button id="speed4" onclick="game.setGameSpeed(4)">4x</button>
            </div>
        </div>
        <div id="canvasContainer">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-section">
            <div class="section-header">📦 Logistics & Stockpile</div>
            <div class="section-content">
                <div class="inventory-grid">
                    <div class="inventory-card"><span class="inv-meta">🍖 Rations</span><span class="inv-val" id="inv-food">0</span></div>
                    <div class="inventory-card"><span class="inv-meta">🪵 Timber</span><span class="inv-val" id="inv-wood">0</span></div>
                    <div class="inventory-card"><span class="inv-meta">🪨 Stone Blocks</span><span class="inv-val" id="inv-stone">0</span></div>
                    <div class="inventory-card"><span class="inv-meta">⚡ Alloy Grid</span><span class="inv-val" id="inv-iron">0</span></div>
                </div>
                <div class="inventory-grid" style="margin-top: 6px;">
                    <div class="inventory-card"><span class="inv-meta">🏠 Habitations</span><span class="inv-val" id="inv-houses">0</span></div>
                    <div class="inventory-card"><span class="inv-meta">🛌 Max Berths</span><span class="inv-val" id="inv-beds">0</span></div>
                </div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="section-header">📜 Settlement Telemetry</div>
            <div class="section-content" id="settlementLog"></div>
        </div>
        <div class="sidebar-section">
            <div class="section-header">👤 Humanoid Manifest</div>
            <div class="section-content" id="minionStatus"></div>
        </div>
    </div>

    <script>
        const NAMES = ["Kaelen", "Lyra", "Roran", "Elysia", "Varek", "Maeve", "Cyrus", "Freya", "Torin", "Aria"];
        const ERAS = ["Primitive Camp", "Agrarian Hamlet", "Industrial Complex", "Cyber-Outpost"];

        class WorldTile {
            constructor(x, y, terrain) {
                this.x = x;
                this.y = y;
                this.terrain = terrain; // 'grass', 'tree', 'stone', 'iron', 'foundation', 'house'
                this.resourceAmount = (terrain === 'grass') ? 0 : 120;
                this.buildProgress = 0;
            }
        }

        class WorldGenerator {
            constructor(w, h) {
                this.width = w;
                this.height = h;
                this.tiles = [];
                this.generate();
            }
            generate() {
                for (let y = 0; y < this.height; y++) {
                    const row = [];
                    for (let x = 0; x < this.width; x++) {
                        let terrain = 'grass';
                        let dist = Math.sqrt(Math.pow(x-this.width/2, 2) + Math.pow(y-this.height/2, 2));
                        let noise = Math.sin(x*0.3) * Math.cos(y*0.3);
                        
                        if (dist > 3) {
                            if (noise > 0.4) terrain = 'tree';
                            else if (noise < -0.45) terrain = 'stone';
                            else if (noise > 0.33 && noise < 0.38) terrain = 'iron';
                        }
                        row.push(new WorldTile(x, y, terrain));
                    }
                    this.tiles.push(row);
                }
            }
            getTile(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return null;
                return this.tiles[y][x];
            }
        }

        class Humanoid {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.targetX = x; this.targetY = y;
                this.speed = 0.04;
                this.name = NAMES[Math.floor(Math.random()*NAMES.length)];
                this.gender = Math.random() > 0.5 ? 'M' : 'F';
                this.hunger = 0;
                this.energy = 100;
                this.currentTask = 'idle';
                this.actionTarget = null;
                this.animFrame = Math.random() * 100;
                this.isMoving = false;
            }

            update(engine) {
                this.hunger += 0.03 * engine.gameSpeed;
                this.energy -= 0.015 * engine.gameSpeed;
                this.animFrame += 0.15 * engine.gameSpeed;

                if (this.hunger > 95) { this.isDead = true; return; }

                // IA Logic Branching Matrix
                if (this.hunger > 55 && this.currentTask !== 'eating') {
                    this.findResource(engine, 'tree', 'eating'); // Map foraging to trees
                } else if (this.energy < 20 && this.currentTask !== 'sleeping') {
                    this.currentTask = 'sleeping';
                    this.targetX = Math.floor(engine.mapWidth/2); this.targetY = Math.floor(engine.mapHeight/2);
                } else if (this.currentTask === 'idle') {
                    this.assignJob(engine);
                }

                this.moveTowardsTarget();
                this.executeWork(engine);
            }

            assignJob(engine) {
                if (engine.resources.wood < engine.resources.stone) {
                    this.findResource(engine, 'tree', 'logging');
                } else if (engine.resources.stone < 120) {
                    this.findResource(engine, 'stone', 'mining');
                } else {
                    this.findResource(engine, 'foundation', 'constructing') || this.findResource(engine, 'iron', 'extracting');
                }
                if (this.currentTask === 'idle') {
                    this.targetX = Math.max(2, Math.min(engine.mapWidth-3, this.x + (Math.random()*4-2)));
                    this.targetY = Math.max(2, Math.min(engine.mapHeight-3, this.y + (Math.random()*4-2)));
                }
            }

            findResource(engine, type, task) {
                let closest = null; let minDist = Infinity;
                for (let y=0; y<engine.mapHeight; y++) {
                    for (let x=0; x<engine.mapWidth; x++) {
                        let t = engine.world.getTile(x, y);
                        if (t && t.terrain === type && (type === 'foundation' || t.resourceAmount > 0)) {
                            let d = Math.sqrt((x-this.x)**2 + (y-this.y)**2);
                            if (d < minDist) { minDist = d; closest = t; }
                        }
                    }
                }
                if (closest) {
                    this.currentTask = task; this.targetX = closest.x; this.targetY = closest.y; this.actionTarget = closest;
                    return true;
                }
                return false;
            }

            moveTowardsTarget() {
                let dx = this.targetX - this.x; let dy = this.targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0.08) {
                    this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                    this.isMoving = true;
                } else {
                    this.x = this.targetX; this.y = this.targetY;
                    this.isMoving = false;
                }
            }

            executeWork(engine) {
                let dist = Math.sqrt((this.targetX - this.x)**2 + (this.targetY - this.y)**2);
                if (dist > 0.15) return;

                if (this.currentTask === 'eating') {
                    this.hunger = Math.max(0, this.hunger - 4);
                    engine.resources.food = Math.max(0, engine.resources.food - 0.5);
                    if (this.hunger <= 5) this.currentTask = 'idle';
                } else if (this.currentTask === 'sleeping') {
                    this.energy = Math.min(100, this.energy + 0.8);
                    if (this.energy >= 95) this.currentTask = 'idle';
                } else if (this.actionTarget && this.actionTarget.resourceAmount > 0) {
                    this.actionTarget.resourceAmount -= 0.5 * engine.gameSpeed;
                    if (this.currentTask === 'logging') engine.resources.wood += 0.4 * engine.gameSpeed;
                    if (this.currentTask === 'mining') engine.resources.stone += 0.3 * engine.gameSpeed;
                    if (this.currentTask === 'extracting') engine.resources.iron += 0.2 * engine.gameSpeed;
                    
                    if (this.actionTarget.resourceAmount <= 0) {
                        this.actionTarget.terrain = 'grass';
                        this.currentTask = 'idle';
                    }
                } else if (this.currentTask === 'constructing' && this.actionTarget && this.actionTarget.terrain === 'foundation') {
                    this.actionTarget.buildProgress += 0.5 * engine.gameSpeed;
                    if (this.actionTarget.buildProgress >= 100) {
                        this.actionTarget.terrain = 'house';
                        this.actionTarget.buildProgress = 0;
                        engine.resources.houses++;
                        engine.beds += 3;
                        engine.addLog(`🏠 New Habitation structural asset finalized.`, 'success');
                        this.currentTask = 'idle';
                    }
                }
            }
        }

        class RealisticFauna {
            constructor(w, h) {
                this.x = Math.random()*w; this.y = Math.random()*h;
                this.targetX = this.x; this.targetY = this.y;
                this.type = Math.random() > 0.5 ? 'deer' : 'rabbit';
                this.animFrame = Math.random()*50;
            }
            update(engine) {
                this.animFrame += 0.1 * engine.gameSpeed;
                if (Math.random() < 0.015) {
                    this.targetX = Math.max(1, Math.min(engine.mapWidth-2, this.x + (Math.random()*6-3)));
                    this.targetY = Math.max(1, Math.min(engine.mapHeight-2, this.y + (Math.random()*6-3)));
                }
                let dx = this.targetX - this.x; let dy = this.targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0.05) {
                    this.x += (dx/dist) * 0.018 * engine.gameSpeed;
                    this.y += (dy/dist) * 0.018 * engine.gameSpeed;
                }
            }
        }

        class GameEngine {
            constructor() {
                this.tickCount = 0; this.dayCount = 1; this.eraIndex = 0;
                this.isPaused = false; this.gameSpeed = 1;
                this.mapWidth = 20; this.mapHeight = 20;
                this.tileW = 72; this.tileH = 36;
                
                this.world = new WorldGenerator(this.mapWidth, this.mapHeight);
                this.minions = []; this.animals = [];
                this.resources = { food: 500, wood: 100, stone: 50, iron: 0, houses: 0 };
                this.beds = 4; this.gameLog = [];

                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize());
                this.resize();

                // Bootstrap Initial State
                for(let i=0; i<4; i++) this.minions.push(new Humanoid(this.mapWidth/2+i-2, this.mapHeight/2));
                for(let i=0; i<6; i++) this.animals.push(new RealisticFauna(this.mapWidth, this.mapHeight));
                this.addLog("🌍 Sector generation mapped. Humanoid units online.", "success");
            }

            resize() {
                const c = document.getElementById('canvasContainer');
                this.canvas.width = c.clientWidth; this.canvas.height = c.clientHeight;
            }

            togglePause() { this.isPaused = !this.isPaused; }
            setGameSpeed(s) { this.gameSpeed = s; }
            addLog(m, t='info') { this.gameLog.unshift({m, t, stamp:`[C.${this.dayCount}]`}); if(this.gameLog.length>25) this.gameLog.pop(); }

            updateEraEvolution() {
                let currentEra = this.eraIndex;
                if (this.dayCount >= 4 && this.eraIndex === 0) this.eraIndex = 1;
                if (this.dayCount >= 10 && this.eraIndex === 1) this.eraIndex = 2;
                if (this.dayCount >= 20 && this.eraIndex === 2) this.eraIndex = 3;

                if (currentEra !== this.eraIndex) {
                    this.addLog(`🚀 UPGRADE ALERT: Outpost has advanced to the [${ERAS[this.eraIndex]}] Era!`, 'upgrade');
                    document.getElementById('eraDisplay').textContent = ERAS[this.eraIndex];
                }
            }

            checkConstructionLayout() {
                if (this.resources.wood >= 50 && this.resources.stone >= 30) {
                    let rx = Math.floor(Math.random()*(this.mapWidth-4))+2;
                    let ry = Math.floor(Math.random()*(this.mapHeight-4))+2;
                    let tile = this.world.getTile(rx, ry);
                    if (tile && tile.terrain === 'grass') {
                        tile.terrain = 'foundation';
                        this.resources.wood -= 50; this.resources.stone -= 30;
                        this.addLog(`📐 Laid structural blueprints at coordinate vector (${rx}, ${ry}).`);
                    }
                }
            }

            runEngineLoop() {
                if (!this.isPaused) {
                    for (let step=0; step<this.gameSpeed; step++) {
                        this.tickCount++;
                        if (this.tickCount % 500 === 0) { this.dayCount++; this.updateEraEvolution(); }
                        
                        this.minions.forEach((m, idx) => { m.update(this); if (m.isDead) this.minions.splice(idx, 1); });
                        this.animals.forEach(a => a.update(this));
                        
                        if (this.tickCount % 250 === 0) this.checkConstructionLayout();
                        if (this.tickCount % 400 === 0 && this.minions.length < this.beds) {
                            this.minions.push(new Humanoid(this.mapWidth/2, this.mapHeight/2));
                            this.addLog("👶 A newcomer has integrated into your colony infrastructure.", "success");
                        }
                    }
                }
                this.renderScene();
                this.renderUI();
                requestAnimationFrame(() => this.runEngineLoop());
            }

            renderScene() {
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                let ox = this.canvas.width / 2; let oy = this.canvas.height / 6;

                // 1. Terrain Render Pass
                for (let y=0; y<this.mapHeight; y++) {
                    for (let x=0; x<this.mapWidth; x++) {
                        let t = this.world.getTile(x, y);
                        let ix = (x - y) * (this.tileW/2) + ox;
                        let iy = (x + y) * (this.tileH/2) + oy;
                        this.drawRealisticTile(ix, iy, t);
                    }
                }

                // 2. Fauna Simulation Render Pass
                this.animals.forEach(a => {
                    let ix = (a.x - a.y) * (this.tileW/2) + ox;
                    let iy = (a.x + a.y) * (this.tileH/2) + oy;
                    this.drawRealisticFauna(ix, iy, a);
                });

                // 3. Humanoid Anatomy Render Pass
                this.minions.forEach(m => {
                    let ix = (m.x - m.y) * (this.tileW/2) + ox;
                    let iy = (m.x + m.y) * (this.tileH/2) + oy;
                    this.drawHumanoid(ix, iy, m);
                });
            }

            drawRealisticTile(ix, iy, tile) {
                // Flat Ground Base
                this.ctx.beginPath();
                this.ctx.moveTo(ix, iy);
                this.ctx.lineTo(ix + this.tileW/2, iy + this.tileH/2);
                this.ctx.lineTo(ix, iy + this.tileH);
                this.ctx.lineTo(ix - this.tileW/2, iy + this.tileH/2);
                this.ctx.closePath();
                this.ctx.fillStyle = tile.terrain === 'grass' ? '#2c4a21' : '#1e293b';
                this.ctx.fill();
                this.ctx.strokeStyle = 'rgba(255,255,255,0.015)';
                this.ctx.stroke();

                // Vertical Asset Extrusions
                if (tile.terrain === 'tree') {
                    // Realistic Foliage & Trunk Depth
                    this.ctx.fillStyle = '#5c4033';
                    this.ctx.fillRect(ix-3, iy-12, 6, 14); // Trunk
                    this.ctx.fillStyle = '#1b4332';
                    this.ctx.beginPath();
                    this.ctx.arc(ix, iy-20, 14, 0, Math.PI*2); // Canopy
                    this.ctx.arc(ix-8, iy-26, 10, 0, Math.PI*2);
                    this.ctx.arc(ix+8, iy-26, 10, 0, Math.PI*2);
                    this.ctx.fill();
                } else if (tile.terrain === 'stone') {
                    // Layered Crags
                    this.ctx.fillStyle = '#64748b';
                    this.ctx.beginPath();
                    this.ctx.moveTo(ix-10, iy+4); this.ctx.lineTo(ix, iy-12);
                    this.ctx.lineTo(ix+12, iy+2); this.ctx.lineTo(ix, iy+10);
                    this.ctx.fill();
                } else if (tile.terrain === 'iron') {
                    // Shimmering Ore Node
                    this.ctx.fillStyle = '#475569';
                    this.ctx.beginPath();
                    this.ctx.moveTo(ix-8, iy+4); this.ctx.lineTo(ix, iy-8);
                    this.ctx.lineTo(ix+8, iy+4); this.ctx.fill();
                    this.ctx.fillStyle = '#f43f5e'; // Shimmer Core
                    this.ctx.fillRect(ix-2, iy-2, 4, 4);
                } else if (tile.terrain === 'foundation') {
                    this.ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
                    this.ctx.fill();
                } else if (tile.terrain === 'house') {
                    this.drawEvolvingStructure(ix, iy);
                }
            }

            drawEvolvingStructure(ix, iy) {
                let ctx = this.ctx;
                if (this.eraIndex === 0) { // Primitive Tent
                    ctx.fillStyle = '#a16207';
                    ctx.beginPath();
                    ctx.moveTo(ix, iy-22); ctx.lineTo(ix-14, iy+6);
                    ctx.lineTo(ix+14, iy+6); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#451a03'; // Entry flap
                    ctx.beginPath();
                    ctx.moveTo(ix, iy-10); ctx.lineTo(ix-5, iy+6); ctx.lineTo(ix+5, iy+6); ctx.fill();
                } 
                else if (this.eraIndex === 1) { // Thatch Log Cabin
                    ctx.fillStyle = '#78350f'; // Walls
                    ctx.fillRect(ix-16, iy-20, 32, 20);
                    ctx.fillStyle = '#ca8a04'; // Straw Roof slant
                    ctx.beginPath();
                    ctx.moveTo(ix-20, iy-20); ctx.lineTo(ix, iy-36); ctx.lineTo(ix+20, iy-20); ctx.fill();
                    ctx.fillStyle = '#fef08a'; // Door
                    ctx.fillRect(ix-4, iy-10, 8, 10);
                } 
                else if (this.eraIndex === 2) { // Modular Factory House
                    ctx.fillStyle = '#475569'; // Heavy Steel Base
                    ctx.fillRect(ix-18, iy-24, 36, 24);
                    ctx.fillStyle = '#1e293b'; // Segment roof angled panel
                    ctx.fillRect(ix-18, iy-28, 36, 4);
                    ctx.fillStyle = '#e2e8f0'; // Slit Windows
                    ctx.fillRect(ix-12, iy-16, 6, 6);
                    ctx.fillRect(ix+6, iy-16, 6, 6);
                } 
                else { // Cyber Outpost Node
                    ctx.fillStyle = '#0f172a';
                    ctx.strokeStyle = '#06b6d4';
                    ctx.lineWidth = 1.5;
                    ctx.fillRect(ix-20, iy-28, 40, 28);
                    ctx.strokeRect(ix-20, iy-28, 40, 28);
                    ctx.lineWidth = 1;
                    
                    // Neon Core Power Crystals 
                    ctx.fillStyle = 'rgba(6, 182, 212, 0.6)';
                    ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 10;
                    ctx.fillRect(ix-10, iy-20, 20, 10);
                    ctx.shadowBlur = 0;
                }
            }

            drawHumanoid(ix, iy, m) {
                let ctx = this.ctx;
                let bob = m.isMoving ? Math.sin(m.animFrame) * 2 : 0;

                // Era outfit upgrades mapping array
                let clothingColor = ['#7c2d12', '#047857', '#1e40af', '#0f172a'][this.eraIndex];
                let equipmentColor = ['#ca8a04', '#94a3b8', '#cbd5e1', '#22d3ee'][this.eraIndex];

                // Head Sphere Anatomy
                ctx.fillStyle = '#ffdbac'; // Base skin vector
                ctx.beginPath();
                ctx.arc(ix, iy - 26 + bob, 4.5, 0, Math.PI * 2);
                ctx.fill();

                // Torso Chassis
                ctx.fillStyle = clothingColor;
                ctx.fillRect(ix - 4, iy - 21.5 + bob, 8, 12);

                // Alternating gait limbs assembly
                let armSwing = m.isMoving ? Math.sin(m.animFrame) * 4 : 0;
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(ix - 6, iy - 21 + bob + armSwing, 2, 7); // Left Arm
                ctx.fillRect(ix + 4, iy - 21 + bob - armSwing, 2, 7); // Right Arm

                // Legs Projection
                let legStride = m.isMoving ? Math.cos(m.animFrame) * 3 : 0;
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(ix - 3.5, iy - 9.5 + (legStride > 0 ? legStride : 0), 2.5, 9);
                ctx.fillRect(ix + 1, iy - 9.5 + (legStride < 0 ? -legStride : 0), 2.5, 9);

                // Task Equipment Projection Layer
                if (m.currentTask === 'logging' || m.currentTask === 'mining') {
                    ctx.strokeStyle = equipmentColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(ix + 4, iy - 16 + bob);
                    ctx.lineTo(ix + 12, iy - 22 + bob + Math.sin(m.animFrame)*3);
                    ctx.stroke();
                    ctx.lineWidth = 1;
                }
            }

            drawRealisticFauna(ix, iy, animal) {
                let ctx = this.ctx;
                let runBob = Math.sin(animal.animFrame) * 1.5;

                if (animal.type === 'deer') {
                    ctx.fillStyle = '#854d0e'; // Warm Brown coat
                    ctx.fillRect(ix-7, iy-10 + runBob, 14, 8); // Body
                    ctx.fillRect(ix-2, iy-17 + runBob, 4, 8);  // Neck
                    ctx.fillStyle = '#a16207';
                    ctx.fillRect(ix-1, iy-21 + runBob, 5, 4);  // Head
                    // Antlers
                    ctx.strokeStyle = '#451a03';
                    ctx.beginPath(); ctx.moveTo(ix+1, iy-21+runBob); ctx.lineTo(ix+4, iy-26+runBob);
                    ctx.moveTo(ix+1, iy-21+runBob); ctx.lineTo(ix-2, iy-25+runBob); ctx.stroke();
                    // Fine stick thin leg assemblies
                    ctx.fillStyle = '#451a03';
                    ctx.fillRect(ix-6, iy-2, 1.5, 8); ctx.fillRect(ix+4, iy-2, 1.5, 8);
                } else { // Tiny scampering rabbit
                    ctx.fillStyle = '#cbd5e1'; 
                    ctx.beginPath(); ctx.arc(ix, iy-2+runBob, 3.5, 0, Math.PI*2); ctx.fill(); // Torso
                    ctx.beginPath(); ctx.arc(ix+3, iy-5+runBob, 2, 0, Math.PI*2); ctx.fill();  // Head
                    // Ears
                    ctx.fillRect(ix+2, iy-10+runBob, 1, 5);
                }
            }

            renderUI() {
                document.getElementById('dayCounter').textContent = this.dayCount;
                document.getElementById('populationCount').textContent = this.minions.length;
                document.getElementById('animalCount').textContent = this.animals.length;

                document.getElementById('inv-food').textContent = Math.floor(this.resources.food);
                document.getElementById('inv-wood').textContent = Math.floor(this.resources.wood);
                document.getElementById('inv-stone').textContent = Math.floor(this.resources.stone);
                document.getElementById('inv-iron').textContent = Math.floor(this.resources.iron);
                document.getElementById('inv-houses').textContent = this.resources.houses;
                document.getElementById('inv-beds').textContent = this.beds;

                document.getElementById('settlementLog').innerHTML = this.gameLog.map(l => 
                    `<div class="log-entry ${l.t}"><strong>${l.stamp}</strong> ${l.m}</div>`
                ).join('');

                document.getElementById('minionStatus').innerHTML = this.minions.slice(0, 4).map(m => `
                    <div class="minion-card">
                        <div class="minion-header"><span>${m.name}</span><span style="color:var(--accent-blue)">${m.currentTask.toUpperCase()}</span></div>
                        <div class="minion-bar"><div class="minion-fill" style="width:${100 - m.hunger}%; background:var(--accent-green)"></div></div>
                        <div class="minion-bar"><div class="minion-fill" style="width:${m.energy}%; background:var(--accent-amber)"></div></div>
                    </div>
                `).join('');
            }
        }

        const game = new GameEngine();
        game.runEngineLoop();
    </script>
</body>
</html>
