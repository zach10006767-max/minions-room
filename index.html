<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion Survival Simulation - RimWorld/Sims Hybrid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #gameViewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            border-right: 2px solid #444;
        }

        #topBar {
            background: #1a1a1a;
            border-bottom: 2px solid #444;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-display {
            display: flex;
            gap: 20px;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stat-label {
            color: #f39c12;
            font-weight: bold;
        }

        .stat-value {
            color: #3498db;
            min-width: 50px;
        }

        #canvasContainer {
            flex: 1;
            overflow: auto;
            background: #000;
        }

        #canvas {
            background: #556b2f;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #sidebar {
            width: 400px;
            background: #1a1a1a;
            border-left: 2px solid #444;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #444;
            overflow: hidden;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .section-header {
            background: #2a2a2a;
            padding: 10px 12px;
            border-bottom: 1px solid #444;
            font-weight: bold;
            color: #f39c12;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 11px;
        }

        .log-entry {
            padding: 5px 8px;
            margin: 3px 0;
            background: rgba(100, 150, 200, 0.15);
            border-left: 2px solid #3498db;
            border-radius: 2px;
            line-height: 1.4;
        }

        .log-entry.success {
            border-left-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
        }

        .log-entry.warning {
            border-left-color: #f39c12;
            background: rgba(243, 156, 18, 0.15);
        }

        .log-entry.danger {
            border-left-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
        }

        .inventory-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 8px;
            margin: 3px 0;
            background: rgba(100, 150, 200, 0.1);
            border-radius: 2px;
            font-size: 11px;
        }

        .inventory-label {
            color: #e0e0e0;
        }

        .inventory-value {
            color: #2ecc71;
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }

        .minion-card {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            border-radius: 3px;
            padding: 8px;
            margin: 5px 0;
            font-size: 10px;
        }

        .minion-name {
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
        }

        .minion-stat-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 3px 0;
            font-size: 9px;
        }

        .stat-bar-fill {
            flex: 1;
            height: 8px;
            background: #333;
            border-radius: 2px;
            margin: 0 5px;
            overflow: hidden;
        }

        .stat-bar-inner {
            height: 100%;
            background: #3498db;
            transition: width 0.2s;
        }

        .stat-bar-inner.danger {
            background: #e74c3c;
        }

        .stat-bar-inner.warning {
            background: #f39c12;
        }

        .stat-bar-inner.good {
            background: #2ecc71;
        }

        button {
            background: #3498db;
            color: white;
            border: 1px solid #2980b9;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        button:active {
            transform: scale(0.95);
        }

        .control-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="gameViewport">
        <div id="topBar">
            <div class="stat-display">
                <div class="stat-item">
                    <span class="stat-label">DAY:</span>
                    <span class="stat-value" id="dayCounter">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">TICK:</span>
                    <span class="stat-value" id="tickCounter">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">POPULATION:</span>
                    <span class="stat-value" id="populationCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ANIMALS:</span>
                    <span class="stat-value" id="animalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SPEED:</span>
                    <span class="stat-value" id="speedDisplay">1x</span>
                </div>
            </div>
            <div class="control-buttons">
                <button onclick="game.togglePause()">▶ PLAY</button>
                <button onclick="game.setGameSpeed(0.5)">0.5x</button>
                <button onclick="game.setGameSpeed(1)">1x</button>
                <button onclick="game.setGameSpeed(2)">2x</button>
                <button onclick="game.setGameSpeed(4)">4x</button>
            </div>
        </div>
        <div id="canvasContainer">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-section">
            <div class="section-header">📦 SETTLEMENT INVENTORY</div>
            <div class="section-content">
                <div class="inventory-row">
                    <span class="inventory-label">🍖 Food:</span>
                    <span class="inventory-value" id="inv-food">0</span>
                </div>
                <div class="inventory-row">
                    <span class="inventory-label">🌳 Wood:</span>
                    <span class="inventory-value" id="inv-wood">0</span>
                </div>
                <div class="inventory-row">
                    <span class="inventory-label">🪨 Stone:</span>
                    <span class="inventory-value" id="inv-stone">0</span>
                </div>
                <div class="inventory-row">
                    <span class="inventory-label">💰 Gold:</span>
                    <span class="inventory-value" id="inv-gold">0</span>
                </div>
                <div class="inventory-row">
                    <span class="inventory-label">🛏️ Beds:</span>
                    <span class="inventory-value" id="inv-beds">0</span>
                </div>
                <div class="inventory-row">
                    <span class="inventory-label">🏠 Houses:</span>
                    <span class="inventory-value" id="inv-houses">0</span>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="section-header">📜 SETTLEMENT LOG</div>
            <div class="section-content" id="settlementLog"></div>
        </div>

        <div class="sidebar-section">
            <div class="section-header">👤 MINION STATUS</div>
            <div class="section-content" id="minionStatus"></div>
        </div>
    </div>

    <script>
        // ============================================
        // WORLD GENERATION & INITIALIZATION MODULE
        // ============================================

        class WorldTile {
            constructor(x, y, terrain) {
                this.x = x;
                this.y = y;
                this.terrain = terrain; // 'grass', 'tree', 'crop', 'stone'
                this.resourceAmount = 0;
                this.maxResource = 100;
                this.regenerationCounter = 0;
                this.regenerationRate = 150; // Ticks to fully regenerate
            }

            update() {
                if (this.resourceAmount < this.maxResource && this.terrain !== 'grass') {
                    this.regenerationCounter++;
                    if (this.regenerationCounter >= this.regenerationRate) {
                        this.resourceAmount = Math.min(this.maxResource, this.resourceAmount + 10);
                        this.regenerationCounter = 0;
                    }
                }
            }

            harvest(amount) {
                const harvested = Math.min(amount, this.resourceAmount);
                this.resourceAmount -= harvested;
                this.regenerationCounter = 0;
                return harvested;
            }

            draw(ctx, x, y, size) {
                // Base terrain
                switch (this.terrain) {
                    case 'grass':
                        ctx.fillStyle = '#3d5c2f';
                        break;
                    case 'tree':
                        ctx.fillStyle = '#1b6b1f';
                        break;
                    case 'crop':
                        ctx.fillStyle = '#8b7500';
                        break;
                    case 'stone':
                        ctx.fillStyle = '#696969';
                        break;
                    default:
                        ctx.fillStyle = '#556b2f';
                }

                ctx.fillRect(x, y, size, size);

                // Draw resource indicator
                if (this.terrain === 'tree') {
                    // Draw tree symbols
                    ctx.fillStyle = '#4CAF50';
                    ctx.beginPath();
                    ctx.arc(x + size / 2, y + size / 2, size / 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.terrain === 'crop') {
                    // Draw crop symbols
                    ctx.fillStyle = '#FFD700';
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(x + 2 + i * 5, y + 4, 3, 6);
                    }
                } else if (this.terrain === 'stone') {
                    // Draw stone symbol
                    ctx.fillStyle = '#A9A9A9';
                    ctx.fillRect(x + 4, y + 4, 8, 8);
                }

                // Resource depletion indicator
                if (this.resourceAmount < this.maxResource * 0.5 && this.resourceAmount > 0 && this.terrain !== 'grass') {
                    ctx.strokeStyle = '#FF6B6B';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, size, size);
                }

                // Tile border
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, size, size);
            }
        }

        class WorldGenerator {
            constructor(width, height, tileSize) {
                this.width = width;
                this.height = height;
                this.tileSize = tileSize;
                this.tiles = [];
                this.generateWorld();
            }

            generateWorld() {
                // Initialize all tiles as grass
                for (let y = 0; y < this.height; y++) {
                    const row = [];
                    for (let x = 0; x < this.width; x++) {
                        row.push(new WorldTile(x, y, 'grass'));
                    }
                    this.tiles.push(row);
                }

                // Spawn trees (15% of map)
                const treeCount = Math.floor((this.width * this.height * 0.15));
                for (let i = 0; i < treeCount; i++) {
                    const x = Math.floor(Math.random() * this.width);
                    const y = Math.floor(Math.random() * this.height);
                    if (this.getTile(x, y).terrain === 'grass') {
                        this.getTile(x, y).terrain = 'tree';
                        this.getTile(x, y).resourceAmount = 100;
                    }
                }

                // Spawn wild crops/berries (10% of map)
                const cropCount = Math.floor((this.width * this.height * 0.10));
                for (let i = 0; i < cropCount; i++) {
                    const x = Math.floor(Math.random() * this.width);
                    const y = Math.floor(Math.random() * this.height);
                    if (this.getTile(x, y).terrain === 'grass') {
                        this.getTile(x, y).terrain = 'crop';
                        this.getTile(x, y).resourceAmount = 100;
                    }
                }

                // Spawn stone nodes (5% of map)
                const stoneCount = Math.floor((this.width * this.height * 0.05));
                for (let i = 0; i < stoneCount; i++) {
                    const x = Math.floor(Math.random() * this.width);
                    const y = Math.floor(Math.random() * this.height);
                    if (this.getTile(x, y).terrain === 'grass') {
                        this.getTile(x, y).terrain = 'stone';
                        this.getTile(x, y).resourceAmount = 80;
                    }
                }
            }

            getTile(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) {
                    return null;
                }
                return this.tiles[y][x];
            }

            getTileByCoord(pixelX, pixelY) {
                const x = Math.floor(pixelX / this.tileSize);
                const y = Math.floor(pixelY / this.tileSize);
                return this.getTile(x, y);
            }

            update() {
                for (let row of this.tiles) {
                    for (let tile of row) {
                        tile.update();
                    }
                }
            }

            draw(ctx) {
                for (let row of this.tiles) {
                    for (let tile of row) {
                        const x = tile.x * this.tileSize;
                        const y = tile.y * this.tileSize;
                        tile.draw(ctx, x, y, this.tileSize);
                    }
                }
            }
        }

        // ============================================
        // ANIMAL ENTITY
        // ============================================

        class WildAnimal {
            constructor(x, y, id) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = 12;
                this.health = 50;
                this.isDead = false;
            }

            update() {
                // Wander randomly
                if (Math.random() < 0.01) {
                    this.vx = (Math.random() - 0.5) * 3;
                    this.vy = (Math.random() - 0.5) * 3;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Boundary wrapping
                if (this.x < 0) this.x = 800;
                if (this.x > 800) this.x = 0;
                if (this.y < 0) this.y = 600;
                if (this.y > 600) this.y = 0;
            }

            draw(ctx) {
                // Body
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.fillStyle = '#A0522D';
                ctx.beginPath();
                ctx.arc(this.x - 8, this.y - 8, 8, 0, Math.PI * 2);
                ctx.fill();

                // Ears
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(this.x - 12, this.y - 14, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 14, 3, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 10, this.y - 10, 2, 0, Math.PI * 2);
                ctx.fill();

                // Health bar
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - 15, this.y - 28, 30, 3);
                ctx.fillStyle = this.health > 35 ? '#00FF00' : this.health > 20 ? '#FFAA00' : '#FF0000';
                ctx.fillRect(this.x - 15, this.y - 28, (this.health / 50) * 30, 3);

                // Label
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🦌', this.x, this.y + 22);
            }
        }

        // ============================================
        // GAME ENGINE
        // ============================================

        class GameEngine {
            constructor(tileSize) {
                this.tickCount = 0;
                this.dayCount = 0;
                this.isPaused = false;
                this.gameSpeed = 1;
                this.selectedMinionId = null;
                
                // World generation
                this.mapWidth = 16;
                this.mapHeight = 12;
                this.tileSize = tileSize;
                this.world = new WorldGenerator(this.mapWidth, this.mapHeight, tileSize);
                
                // Entities
                this.minions = [];
                this.minionIdCounter = 0;
                this.animals = [];
                this.animalIdCounter = 0;
                this.buildings = [];
                this.buildingIdCounter = 0;
                
                // Resources
                this.resources = {
                    food: 200,
                    wood: 100,
                    stone: 50,
                    gold: 10
                };
                this.beds = 10;
                
                // Game state
                this.gameLog = [];
                this.lastTradeCaravan = 0;
                this.caravanArrivalInterval = 200;
                
                // Spawn initial animals
                this.spawnWildAnimals();
                
                this.addLog('🌍 World generated. Trees 🌳, Crops 🌾, and Stone visible!', 'success');
            }

            spawnWildAnimals() {
                const animalCount = 4;
                for (let i = 0; i < animalCount; i++) {
                    const animal = new WildAnimal(
                        Math.random() * 800 + 200,
                        Math.random() * 400 + 150,
                        this.animalIdCounter++
                    );
                    this.animals.push(animal);
                }
                this.addLog(`🦌 ${animalCount} wild animals roaming the lands`, 'info');
            }

            togglePause() {
                this.isPaused = !this.isPaused;
            }

            setGameSpeed(speed) {
                this.gameSpeed = speed;
                document.getElementById('speedDisplay').textContent = speed + 'x';
            }

            tick() {
                if (this.isPaused) return;

                this.tickCount++;
                if (this.tickCount % 60 === 0) {
                    this.dayCount++;
                }

                // Update world tiles (regeneration)
                this.world.update();

                // Update animals
                this.animals.forEach(animal => animal.update());

                // Update minions
                for (let i = this.minions.length - 1; i >= 0; i--) {
                    this.minions[i].update(this);
                    if (this.minions[i].isDead) {
                        this.addLog(`☠️ ${this.minions[i].name} has died.`, 'danger');
                        this.minions.splice(i, 1);
                    }
                }

                // Reproduction attempts
                if (this.tickCount % 300 === 0) {
                    this.attemptReproduction();
                }

                // Building updates
                this.buildings.forEach(b => b.update(this));

                // Auto-build houses
                if (this.tickCount % 30 === 0) {
                    this.tryBuildHouse();
                }

                // Minion resource harvesting
                if (this.tickCount % 10 === 0) {
                    this.updateResourceHarvesting();
                }

                // Trade caravan
                if (this.tickCount - this.lastTradeCaravan >= this.caravanArrivalInterval) {
                    this.tradeWithCaravan();
                    this.lastTradeCaravan = this.tickCount;
                }

                this.updateUI();
            }

            updateResourceHarvesting() {
                for (let minion of this.minions) {
                    // Prioritize harvesting if hungry
                    if (minion.hunger > 60) {
                        // Find nearest crop tile
                        let nearestCrop = null;
                        let nearestDist = Infinity;

                        for (let row of this.world.tiles) {
                            for (let tile of row) {
                                if (tile.terrain === 'crop' && tile.resourceAmount > 0) {
                                    const tilePixelX = tile.x * this.tileSize + this.tileSize / 2;
                                    const tilePixelY = tile.y * this.tileSize + this.tileSize / 2;
                                    const dx = tilePixelX - minion.x;
                                    const dy = tilePixelY - minion.y;
                                    const dist = Math.sqrt(dx * dx + dy * dy);
                                    if (dist < nearestDist) {
                                        nearestDist = dist;
                                        nearestCrop = tile;
                                    }
                                }
                            }
                        }

                        if (nearestCrop && nearestDist < 150) {
                            minion.currentTask = 'harvesting';
                            const harvested = nearestCrop.harvest(15);
                            this.resources.food += harvested;
                            minion.hunger = Math.max(0, minion.hunger - harvested * 0.5);
                        }
                    }

                    // Harvest wood if wood is low
                    if (this.resources.wood < 100 && minion.energy > 40) {
                        let nearestTree = null;
                        let nearestDist = Infinity;

                        for (let row of this.world.tiles) {
                            for (let tile of row) {
                                if (tile.terrain === 'tree' && tile.resourceAmount > 0) {
                                    const tilePixelX = tile.x * this.tileSize + this.tileSize / 2;
                                    const tilePixelY = tile.y * this.tileSize + this.tileSize / 2;
                                    const dx = tilePixelX - minion.x;
                                    const dy = tilePixelY - minion.y;
                                    const dist = Math.sqrt(dx * dx + dy * dy);
                                    if (dist < nearestDist) {
                                        nearestDist = dist;
                                        nearestTree = tile;
                                    }
                                }
                            }
                        }

                        if (nearestTree && nearestDist < 200) {
                            minion.currentTask = 'gathering';
                            const harvested = nearestTree.harvest(10);
                            this.resources.wood += harvested;
                            minion.energy = Math.max(0, minion.energy - harvested * 0.3);
                        }
                    }
                }
            }

            attemptReproduction() {
                if (this.minions.length < 2) return;

                for (let i = 0; i < this.minions.length; i++) {
                    if (this.minions[i].age < 20) continue;
                    if (this.minions[i].libido < 70) continue;

                    for (let j = i + 1; j < this.minions.length; j++) {
                        if (this.minions[j].age < 20) continue;
                        if (this.minions[j].libido < 70) continue;
                        if (this.minions[i].sex === this.minions[j].sex) continue;

                        const dx = this.minions[i].x - this.minions[j].x;
                        const dy = this.minions[i].y - this.minions[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 50) {
                            const newMinion = new Minion(
                                this.minions[i].x + Math.random() * 20 - 10,
                                this.minions[i].y + Math.random() * 20 - 10,
                                this.minionIdCounter++
                            );
                            newMinion.age = 0;
                            this.minions.push(newMinion);
                            this.minions[i].libido = 0;
                            this.minions[j].libido = 0;
                            this.addLog(`👶 New minion born: ${newMinion.name}`, 'success');
                            return;
                        }
                    }
                }
            }

            tryBuildHouse() {
                if (this.resources.wood < 50 || this.resources.stone < 50) return;
                if (this.buildings.length >= 8) return;

                const x = Math.floor(Math.random() * (this.mapWidth - 3)) + 2;
                const y = Math.floor(Math.random() * (this.mapHeight - 3)) + 2;

                const building = new Building(x * this.tileSize, y * this.tileSize, 'house', this.buildingIdCounter++);
                this.buildings.push(building);

                this.resources.wood -= 50;
                this.resources.stone -= 50;
                this.beds += 2;
                this.addLog(`🏠 New house blueprint at (${x}, ${y})`, 'success');
            }

            tradeWithCaravan() {
                let trades = [];
                
                if (this.resources.food > 500) {
                    const surplus = this.resources.food - 300;
                    const goldEarned = Math.floor(surplus * 0.5);
                    this.resources.food = 300;
                    this.resources.gold += goldEarned;
                    trades.push(`Sold ${surplus} Food`);
                }

                if (this.resources.wood < 80 && this.resources.gold >= 20) {
                    this.resources.gold -= 20;
                    this.resources.wood += 60;
                    trades.push(`Bought 60 Wood`);
                }

                if (this.resources.stone < 80 && this.resources.gold >= 15) {
                    this.resources.gold -= 15;
                    this.resources.stone += 50;
                    trades.push(`Bought 50 Stone`);
                }

                if (trades.length > 0) {
                    this.addLog(`🛒 Caravan: ${trades.join('; ')}`, 'success');
                }
            }

            addLog(message, type = 'info') {
                const timestamp = `Day ${this.dayCount}`;
                const entry = { message, type, timestamp };
                this.gameLog.unshift(entry);
                if (this.gameLog.length > 50) this.gameLog.pop();
            }

            updateUI() {
                document.getElementById('dayCounter').textContent = this.dayCount;
                document.getElementById('tickCounter').textContent = this.tickCount;
                document.getElementById('populationCount').textContent = this.minions.length;
                document.getElementById('animalCount').textContent = this.animals.length;

                document.getElementById('inv-food').textContent = this.resources.food;
                document.getElementById('inv-wood').textContent = this.resources.wood;
                document.getElementById('inv-stone').textContent = this.resources.stone;
                document.getElementById('inv-gold').textContent = this.resources.gold;
                document.getElementById('inv-beds').textContent = this.beds;
                document.getElementById('inv-houses').textContent = this.buildings.length;

                const logHtml = this.gameLog.map(entry => 
                    `<div class="log-entry ${entry.type}"><strong>${entry.timestamp}:</strong> ${entry.message}</div>`
                ).join('');
                document.getElementById('settlementLog').innerHTML = logHtml || '<div style="opacity: 0.5;">No events yet...</div>';

                if (this.minions.length > 0) {
                    const topMinions = this.minions.slice(0, 3);
                    document.getElementById('minionStatus').innerHTML = topMinions.map(m => 
                        this.getMinionStatusHtml(m)
                    ).join('');
                } else {
                    document.getElementById('minionStatus').innerHTML = '<div style="opacity: 0.5;">No minions yet...</div>';
                }
            }

            getMinionStatusHtml(minion) {
                const hungerPercent = (minion.hunger / 100) * 100;
                const energyPercent = (minion.energy / 100) * 100;
                const libidoPercent = (minion.libido / 100) * 100;

                const hungerClass = minion.hunger > 80 ? 'danger' : minion.hunger > 50 ? 'warning' : 'good';
                const energyClass = minion.energy < 20 ? 'danger' : minion.energy < 50 ? 'warning' : 'good';

                return `
                    <div class="minion-card">
                        <div class="minion-name">${minion.name} ${minion.sex === 'M' ? '♂' : '♀'}</div>
                        <div class="minion-stat-bar">
                            <span>HUNGER:</span>
                            <div class="stat-bar-fill"><div class="stat-bar-inner ${hungerClass}" style="width: ${hungerPercent}%"></div></div>
                            <span>${Math.round(minion.hunger)}</span>
                        </div>
                        <div class="minion-stat-bar">
                            <span>ENERGY:</span>
                            <div class="stat-bar-fill"><div class="stat-bar-inner ${energyClass}" style="width: ${energyPercent}%"></div></div>
                            <span>${Math.round(minion.energy)}</span>
                        </div>
                        <div class="minion-stat-bar">
                            <span>LIBIDO:</span>
                            <div class="stat-bar-fill"><div class="stat-bar-inner" style="width: ${libidoPercent}%; background: #e91e63;"></div></div>
                            <span>${Math.round(minion.libido)}</span>
                        </div>
                        <div style="margin-top: 8px; font-size: 10px; color: #aaa;">
                            Task: <span style="color: #3498db; font-weight: bold;">${minion.currentTask}</span>
                        </div>
                    </div>
                `;
            }
        }

        // ============================================
        // MINION ENTITY
        // ============================================

        class Minion {
            constructor(x, y, id) {
                this.id = id;
                this.name = this.generateName();
                this.sex = Math.random() < 0.5 ? 'M' : 'F';
                this.age = 20 + Math.random() * 30;
                
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                
                this.hunger = 40 + Math.random() * 30;
                this.energy = 70 + Math.random() * 30;
                this.libido = Math.random() * 50;
                this.isDead = false;
                
                this.currentTask = 'wandering';
                this.taskTimer = 0;
            }

            generateName() {
                const names = ['Bob', 'Alice', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Henry'];
                return names[Math.floor(Math.random() * names.length)] + '_' + Math.floor(Math.random() * 1000);
            }

            update(engine) {
                this.age += 0.01;
                this.hunger += 0.12;
                this.energy -= 0.1;
                this.libido += 0.03;

                this.hunger = Math.min(100, this.hunger);
                this.energy = Math.max(0, this.energy);
                this.libido = Math.min(100, this.libido);

                if (this.hunger >= 100) {
                    this.isDead = true;
                    return;
                }

                if (this.energy <= 0) {
                    this.currentTask = 'sleeping';
                    this.energy = Math.min(100, this.energy + 1);
                    if (this.energy >= 60) {
                        this.currentTask = 'wandering';
                    }
                }

                if (this.hunger > 80) {
                    this.currentTask = 'eating';
                } else if (this.energy < 20) {
                    this.currentTask = 'sleeping';
                } else if (this.currentTask === 'eating' && this.hunger < 40) {
                    this.currentTask = 'wandering';
                }

                if (this.currentTask === 'wandering') {
                    if (Math.random() < 0.02) {
                        this.vx = (Math.random() - 0.5) * 2.5;
                        this.vy = (Math.random() - 0.5) * 2.5;
                    }
                } else if (this.currentTask === 'sleeping') {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Boundary wrapping for larger canvas
                if (this.x < 10) this.x = 10;
                if (this.x > 400 - 10) this.x = 400 - 10;
                if (this.y < 10) this.y = 10;
                if (this.y > 300 - 10) this.y = 300 - 10;
            }

            draw(ctx, selected) {
                ctx.fillStyle = selected ? '#FFD700' : '#FFD93D';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 2, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y - 2, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y + 2, 2, 0, Math.PI);
                ctx.stroke();

                if (selected) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 18, 0, Math.PI * 2);
                    ctx.stroke();
                }

                const barWidth = 20;
                const barHeight = 2;
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - barWidth / 2, this.y - 16, barWidth, barHeight);
                const healthPercent = 100 - (this.hunger / 100) * 50 - (this.energy / 100) * 50;
                ctx.fillStyle = healthPercent > 75 ? '#00FF00' : healthPercent > 50 ? '#FFAA00' : '#FF0000';
                ctx.fillRect(this.x - barWidth / 2, this.y - 16, (barWidth * healthPercent) / 100, barHeight);
            }
        }

        // ============================================
        // BUILDING ENTITY
        // ============================================

        class Building {
            constructor(x, y, type, id) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.type = type;
                this.width = 35;
                this.height = 45;
                this.health = 100;
                this.constructionProgress = 0;
                this.isBuilt = false;
            }

            update(engine) {
                if (!this.isBuilt) {
                    for (let minion of engine.minions) {
                        if (minion.energy > 40 && minion.hunger < 60) {
                            const dx = this.x - minion.x;
                            const dy = this.y - minion.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 80) {
                                minion.currentTask = 'building';
                                this.constructionProgress += 0.8;
                                if (this.constructionProgress >= 100) {
                                    this.isBuilt = true;
                                    engine.addLog(`🏠 House completed!`, 'success');
                                }
                                break;
                            }
                        }
                    }
                }
            }

            draw(ctx) {
                const opacity = this.isBuilt ? 1 : 0.6;
                ctx.globalAlpha = opacity;

                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

                ctx.fillStyle = '#DC143C';
                ctx.beginPath();
                ctx.moveTo(this.x - this.width / 2, this.y - this.height / 2);
                ctx.lineTo(this.x, this.y - this.height / 2 - 12);
                ctx.lineTo(this.x + this.width / 2, this.y - this.height / 2);
                ctx.fill();

                ctx.fillStyle = '#654321';
                ctx.fillRect(this.x - 7, this.y, 14, 18);

                if (!this.isBuilt) {
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(this.x - 18, this.y - this.height / 2 - 22, 36, 4);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(this.x - 18, this.y - this.height / 2 - 22, (36 * this.constructionProgress) / 100, 4);
                }

                ctx.globalAlpha = 1;
            }
        }

        // ============================================
        // RENDERER
        // ============================================

        class Renderer {
            constructor(canvasElement, tileSize) {
                this.canvas = canvasElement;
                this.ctx = this.canvas.getContext('2d');
                this.tileSize = tileSize;
                this.zoom = 1;
                this.cameraX = 0;
                this.cameraY = 0;
            }

            render(game) {
                const width = game.mapWidth * this.tileSize;
                const height = game.mapHeight * this.tileSize;
                
                this.canvas.width = width;
                this.canvas.height = height;

                this.ctx.fillStyle = '#556b2f';
                this.ctx.fillRect(0, 0, width, height);

                // Draw world tiles
                game.world.draw(this.ctx);

                // Draw buildings
                game.buildings.forEach(building => building.draw(this.ctx));

                // Draw animals
                game.animals.forEach(animal => animal.draw(this.ctx));

                // Draw minions
                game.minions.forEach(minion => {
                    const isSelected = minion.id === game.selectedMinionId;
                    minion.draw(this.ctx, isSelected);
                });

                // Draw stats on canvas
                this.ctx.fillStyle = '#000';
                this.ctx.font = 'bold 12px monospace';
                this.ctx.fillText(`Paused: ${game.isPaused}`, 10, 20);
            }
        }

        // ============================================
        // MAIN GAME LOOP
        // ============================================

        const TILE_SIZE = 50;
        const canvas = document.getElementById('canvas');
        const game = new GameEngine(TILE_SIZE);
        const renderer = new Renderer(canvas, TILE_SIZE);

        // Spawn initial minions in safe zone (center)
        const centerX = (game.mapWidth / 2) * TILE_SIZE;
        const centerY = (game.mapHeight / 2) * TILE_SIZE;
        for (let i = 0; i < 6; i++) {
            const minion = new Minion(
                centerX + (Math.random() - 0.5) * 100,
                centerY + (Math.random() - 0.5) * 100,
                game.minionIdCounter++
            );
            game.minions.push(minion);
        }

        game.addLog(`👥 ${game.minions.length} minions spawned in settlement center`, 'success');

        function gameLoop() {
            for (let i = 0; i < game.gameSpeed; i++) {
                game.tick();
            }
            renderer.render(game);
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let minion of game.minions) {
                const dx = minion.x - x;
                const dy = minion.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < 20) {
                    game.selectedMinionId = minion.id;
                    game.addLog(`👤 Selected: ${minion.name}`, 'info');
                    return;
                }
            }

            game.selectedMinionId = null;
        });

        window.addEventListener('resize', () => {
            // Canvas will resize dynamically
        });
    </script>
</body>
</html>
