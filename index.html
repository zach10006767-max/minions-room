<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minions Room Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 1100px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 2.5em;
        }

        canvas {
            border: 5px solid white;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: block;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }

        .info {
            color: white;
            margin-top: 20px;
            font-size: 14px;
        }

        .controls {
            margin-top: 15px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #FF5252;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .stats {
            color: white;
            margin-top: 10px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stats p {
            margin: 5px;
        }

        .minion-list {
            color: white;
            margin-top: 15px;
            font-size: 12px;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .minion-list h3 {
            margin-bottom: 10px;
            text-align: center;
        }

        .minion-entry {
            padding: 5px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍌 Minions Room Simulator 🍌</h1>
        <canvas id="canvas" width="1000" height="600"></canvas>
        <div class="info">
            <p>👆 Click on the canvas to add waypoints • Double-click a minion to remove it</p>
        </div>
        <div class="controls">
            <button id="addBtn">➕ Add Minion</button>
            <button id="clearBtn">🗑️ Clear Waypoints</button>
            <button id="resetBtn">🔄 Reset Room</button>
            <button id="pauseBtn">⏸️ Pause/Resume</button>
        </div>
        <div class="stats">
            <p>👥 Minions: <span id="minionCount">0</span></p>
            <p>📍 Waypoints: <span id="waypointCount">0</span></p>
            <p>⚡ FPS: <span id="fps">0</span></p>
        </div>
        <div class="minion-list">
            <h3>Active Minions:</h3>
            <div id="minionDetails"></div>
        </div>
    </div>

    <script>
        // ===== GAME STATE =====
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const gameState = {
            minions: [],
            waypoints: [],
            paused: false,
            frameCount: 0,
            lastFpsTime: Date.now(),
            fps: 0
        };

        // ===== JOB DEFINITIONS =====
        const JOBS = [
            { name: 'Engineer', color: '#FF6B35', speed: 1.2, size: 12 },
            { name: 'Scientist', color: '#004E89', speed: 1.0, size: 11 },
            { name: 'Manager', color: '#F77F00', speed: 0.8, size: 13 },
            { name: 'Pilot', color: '#06A77D', speed: 1.5, size: 10 },
            { name: 'Security', color: '#D62828', speed: 1.1, size: 12 },
            { name: 'Doctor', color: '#F4D35E', speed: 0.9, size: 11 },
            { name: 'Chef', color: '#EE964B', speed: 0.7, size: 12 },
            { name: 'Technician', color: '#A23B72', speed: 1.3, size: 10 }
        ];

        // ===== MINION CLASS =====
        class Minion {
            constructor(x, y, jobIndex) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.job = JOBS[jobIndex % JOBS.length];
                this.radius = this.job.size;
                this.speed = this.job.speed;
                this.waypoints = [];
                this.currentWaypointIndex = 0;
                this.targetWaypoint = null;
                this.wanderAngle = Math.random() * Math.PI * 2;
                this.wanderTimer = 0;
                this.nextWanderTime = 30 + Math.random() * 70;
                this.id = Math.random().toString(36).substr(2, 9);
            }

            setWaypoints(waypoints) {
                this.waypoints = waypoints.slice();
                this.currentWaypointIndex = 0;
                this.targetWaypoint = this.waypoints.length > 0 ? this.waypoints[0] : null;
            }

            update() {
                if (this.waypoints.length > 0 && this.targetWaypoint) {
                    this.followWaypoint();
                } else {
                    this.wander();
                }

                this.x += this.vx;
                this.y += this.vy;

                // Boundaries
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.5;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -0.5;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -0.5;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy *= -0.5;
                }
            }

            followWaypoint() {
                if (!this.targetWaypoint) return;
                const dx = this.targetWaypoint.x - this.x;
                const dy = this.targetWaypoint.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 15) {
                    this.currentWaypointIndex++;
                    if (this.currentWaypointIndex >= this.waypoints.length) {
                        this.currentWaypointIndex = 0;
                    }
                    this.targetWaypoint = this.waypoints[this.currentWaypointIndex];
                } else {
                    const angle = Math.atan2(dy, dx);
                    this.vx = Math.cos(angle) * this.speed;
                    this.vy = Math.sin(angle) * this.speed;
                }
            }

            wander() {
                this.wanderTimer++;
                if (this.wanderTimer > this.nextWanderTime) {
                    this.wanderAngle += (Math.random() - 0.5) * Math.PI * 0.5;
                    this.wanderTimer = 0;
                    this.nextWanderTime = 30 + Math.random() * 70;
                }
                this.vx = Math.cos(this.wanderAngle) * this.speed * 0.5;
                this.vy = Math.sin(this.wanderAngle) * this.speed * 0.5;
            }

            draw() {
                ctx.fillStyle = this.job.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - 2, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y - 2, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y + 2, 3, 0, Math.PI);
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.job.name.substr(0, 3), this.x, this.y + this.radius + 10);
            }

            distanceTo(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                return Math.sqrt(dx * dx + dy * dy);
            }

            separateFrom(others) {
                const separationRadius = this.radius * 3;
                const separationForce = 0.3;
                for (let other of others) {
                    if (other === this) continue;
                    const distance = this.distanceTo(other);
                    if (distance < separationRadius && distance > 0) {
                        const angle = Math.atan2(other.y - this.y, other.x - this.x);
                        this.vx -= Math.cos(angle) * separationForce;
                        this.vy -= Math.sin(angle) * separationForce;
                    }
                }
            }
        }

        // ===== EVENT LISTENERS =====
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            gameState.waypoints.push({ x, y });
            gameState.minions.forEach(m => m.setWaypoints(gameState.waypoints));
        });

        canvas.addEventListener('dblclick', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            for (let i = gameState.minions.length - 1; i >= 0; i--) {
                if (gameState.minions[i].distanceTo({ x, y }) < gameState.minions[i].radius * 2) {
                    gameState.minions.splice(i, 1);
                    break;
                }
            }
        });

        document.getElementById('addBtn').addEventListener('click', () => {
            if (gameState.minions.length >= 20) {
                alert('Max 20 minions!');
                return;
            }
            const minion = new Minion(
                Math.random() * (canvas.width - 100) + 50,
                Math.random() * (canvas.height - 100) + 50,
                gameState.minions.length
            );
            minion.setWaypoints(gameState.waypoints);
            gameState.minions.push(minion);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            gameState.waypoints = [];
            gameState.minions.forEach(m => m.setWaypoints([]));
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            gameState.minions = [];
            gameState.waypoints = [];
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            gameState.paused = !gameState.paused;
        });

        // ===== UPDATE UI =====
        function updateUI() {
            document.getElementById('minionCount').textContent = gameState.minions.length;
            document.getElementById('waypointCount').textContent = gameState.waypoints.length;
            document.getElementById('fps').textContent = gameState.fps;

            const detailsDiv = document.getElementById('minionDetails');
            if (gameState.minions.length === 0) {
                detailsDiv.innerHTML = '<div class="minion-entry">Click "Add Minion" to start!</div>';
            } else {
                detailsDiv.innerHTML = gameState.minions.map(m => 
                    `<div class="minion-entry">🍌 ${m.job.name} (#${m.id.substr(0, 4)}) - (${Math.round(m.x)}, ${Math.round(m.y)})</div>`
                ).join('');
            }
        }

        // ===== GAME LOOP =====
        function gameLoop() {
            if (!gameState.paused) {
                gameState.minions.forEach(minion => {
                    minion.update();
                    minion.separateFrom(gameState.minions);
                });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw waypoints
            gameState.waypoints.forEach((wp, idx) => {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(wp.x, wp.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(idx + 1, wp.x, wp.y);
            });

            // Draw path
            if (gameState.waypoints.length > 1) {
                ctx.strokeStyle = 'rgba(255, 165, 0, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(gameState.waypoints[0].x, gameState.waypoints[0].y);
                for (let i = 1; i < gameState.waypoints.length; i++) {
                    ctx.lineTo(gameState.waypoints[i].x, gameState.waypoints[i].y);
                }
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Draw minions
            gameState.minions.forEach(m => m.draw());

            // FPS
            gameState.frameCount++;
            const now = Date.now();
            if (now - gameState.lastFpsTime >= 1000) {
                gameState.fps = gameState.frameCount;
                gameState.frameCount = 0;
                gameState.lastFpsTime = now;
            }

            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // Start with 3 minions
        for (let i = 0; i < 3; i++) {
            const minion = new Minion(
                Math.random() * (canvas.width - 100) + 50,
                Math.random() * (canvas.height - 100) + 50,
                i
            );
            gameState.minions.push(minion);
        }

        gameLoop();
    </script>
</body>
</html>
