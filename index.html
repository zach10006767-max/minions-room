<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheria Settlement Engine v2026.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-panel: rgba(18, 20, 29, 0.75);
            --border-glow: rgba(52, 152, 219, 0.2);
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #f87171;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            backdrop-filter: blur(20px);
        }

        /* Ambient background grid */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 100px 100px;
            z-index: -1;
        }

        #gameViewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        #topBar {
            background: linear-gradient(to bottom, rgba(10, 11, 16, 0.95), rgba(10, 11, 16, 0.8));
            border-bottom: 1px solid var(--border-glow);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
        }

        .stat-display {
            display: flex;
            gap: 28px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        #canvasContainer {
            flex: 1;
            position: relative;
            background: #0d0f16;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 440px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            z-index: 10;
        }

        .sidebar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .section-header {
            padding: 18px 24px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 2026 Grid Dashboard items */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .inventory-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .inventory-card:hover {
            border-color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.04);
            transform: translateY(-2px);
        }

        .inv-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .inv-val {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* Logs stream styling */
        .log-entry {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.01);
            border-left: 3px solid var(--accent-blue);
            border-radius: 4px;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .log-entry strong { color: var(--text-primary); margin-right: 6px; }
        .log-entry.success { border-left-color: var(--accent-green); background: rgba(52, 211, 153, 0.03); }
        .log-entry.warning { border-left-color: var(--accent-amber); background: rgba(251, 191, 36, 0.03); }
        .log-entry.danger { border-left-color: var(--accent-rose); background: rgba(248, 113, 113, 0.03); }

        /* Complex Minion Vector Cards */
        .minion-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .minion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .minion-identity {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .minion-task-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .minion-traits {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 8px;
        }

        .minion-stat-bar {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .bar-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-buttons {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        button {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-sans);
            transition: all 0.2s;
        }

        button.active, button:hover {
            background: var(--accent-blue);
            color: var(--bg-main);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="gameViewport">
        <div id="topBar">
            <div class="stat-display">
                <div class="stat-item">
                    <span class="stat-label">Cycle Day</span>
                    <span class="stat-value" id="dayCounter">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Engine Ticks</span>
                    <span class="stat-value" id="tickCounter">000000</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Colony Population</span>
                    <span class="stat-value" id="populationCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Fauna Density</span>
                    <span class="stat-value" id="animalCount">0</span>
                </div>
            </div>
            <div class="control-buttons">
                <button id="btn-pause" onclick="game.togglePause()">PAUSE</button>
                <button id="speed1" class="active" onclick="game.setGameSpeed(1)">1x</button>
                <button id="speed2" onclick="game.setGameSpeed(2)">2x</button>
                <button id="speed4" onclick="game.setGameSpeed(4)">4x</button>
            </div>
        </div>
        <div id="canvasContainer">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-section">
            <div class="section-header">
                <span>📦 Core Outpost Inventory</span>
            </div>
            <div class="section-content">
                <div class="inventory-grid">
                    <div class="inventory-card">
                        <div class="inv-meta">🍖 Food Stock</div>
                        <div class="inv-val" id="inv-food">0</div>
                    </div>
                    <div class="inventory-card">
                        <div class="inv-meta">🪵 Lumber</div>
                        <div class="inv-val" id="inv-wood">0</div>
                    </div>
                    <div class="inventory-card">
                        <div class="inv-meta">🪨 Minerals</div>
                        <div class="inv-val" id="inv-stone">0</div>
                    </div>
                    <div class="inventory-card">
                        <div class="inv-meta">🪙 Credit Assets</div>
                        <div class="inv-val" id="inv-gold">0</div>
                    </div>
                </div>
                <div class="inventory-grid" style="margin-top: -4px;">
                    <div class="inventory-card">
                        <div class="inv-meta">🛌 Berths</div>
                        <div class="inv-val" id="inv-beds">0</div>
                    </div>
                    <div class="inventory-card">
                        <div class="inv-meta">🏠 Structural Grid</div>
                        <div class="inv-val" id="inv-houses">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="section-header">📜 Diagnostics & Event Log</div>
            <div class="section-content" id="settlementLog"></div>
        </div>

        <div class="sidebar-section">
            <div class="section-header">👤 Colony Manifest (Vitals)</div>
            <div class="section-content" id="minionStatus"></div>
        </div>
    </div>

    <script>
        // Name Generation Repositories
        const NAMES_M = ["Kaelen", "Roran", "Varek", "Jaxon", "Cyrus", "Garrick", "Soren", "Torin", "Bram"];
        const NAMES_F = ["Lyra", "Elysia", "Seraphina", "Vespera", "Maeve", "Freya", "Aria", "Isolde", "Kira"];
        const SURNAMES = ["Stormcoat", "Ironwood", "Stoneshaper", "Ridgebreaker", "Deepwood", "Oathen", "Starrunner"];

        // ============================================
        // ISOMETRIC WORLD ENGINE & PROCECON TILE DESIGN
        // ============================================
        class WorldTile {
            constructor(x, y, terrain) {
                this.x = x;
                this.y = y;
                this.terrain = terrain; // 'grass', 'tree', 'crop', 'stone', 'foundation', 'house'
                this.resourceAmount = (terrain === 'grass') ? 0 : 100;
                this.maxResource = 100;
                this.regenerationCounter = 0;
                this.regenerationRate = 400; 
                this.buildProgress = 0; // For constructing homes
            }

            update() {
                if (this.resourceAmount < this.maxResource && (this.terrain === 'tree' || this.terrain === 'crop')) {
                    this.regenerationCounter++;
                    if (this.regenerationCounter >= this.regenerationRate) {
                        this.resourceAmount = Math.min(this.maxResource, this.resourceAmount + 25);
                        this.regenerationCounter = 0;
                    }
                }
            }

            harvest(amount) {
                let available = Math.min(amount, this.resourceAmount);
                this.resourceAmount -= available;
                return available;
            }
        }

        class WorldGenerator {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.tiles = [];
                this.generateMatrix();
            }

            generateMatrix() {
                for (let y = 0; y < this.height; y++) {
                    const row = [];
                    for (let x = 0; x < this.width; x++) {
                        // Advanced analytical noise layer substitute
                        let noiseFactor = Math.sin(x * 0.4) * Math.cos(y * 0.4) + Math.sin(y * 0.1);
                        let terrain = 'grass';
                        
                        // Central clearing for standard safe spawn guarantees
                        let distToCenter = Math.sqrt(Math.pow(x - this.width/2, 2) + Math.pow(y - this.height/2, 2));
                        
                        if (distToCenter > 3) {
                            if (noiseFactor > 0.4) terrain = 'tree';
                            else if (noiseFactor < -0.3) terrain = 'crop';
                            else if (noiseFactor > 0.25 && noiseFactor < 0.35) terrain = 'stone';
                        }
                        row.push(new WorldTile(x, y, terrain));
                    }
                    this.tiles.push(row);
                }
            }

            getTile(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) return null;
                return this.tiles[y][x];
            }
        }

        // ============================================
        // SUB-PIXEL VECTOR VECTOR MINION ENTITIES 
        // ============================================
        class Minion {
            constructor(mapX, mapY, id) {
                this.id = id;
                this.sex = Math.random() > 0.5 ? 'M' : 'F';
                this.name = `${this.sex === 'M' ? NAMES_M[Math.floor(Math.random()*NAMES_M.length)] : NAMES_F[Math.floor(Math.random()*NAMES_F.length)]} ${SURNAMES[Math.floor(Math.random()*SURNAMES.length)]}`;
                
                // Vector Positional Data
                this.x = mapX; 
                this.y = mapY;
                this.targetX = mapX;
                this.targetY = mapY;
                this.speed = 0.05; // Tile percentage coverage per frame update
                
                // Vitals State Matrix
                this.age = 22;
                this.hunger = 20;  // Scale 0-100 (High = Hungry)
                this.energy = 100; // Scale 0-100 (Low = Tired)
                this.libido = 10;  // Scale 0-100
                
                this.currentTask = 'idle'; // 'idle', 'seeking_food', 'harvesting', 'gathering_wood', 'mining', 'building', 'sleeping'
                this.actionTarget = null;
            }

            update(engine) {
                // Lifecycles increments
                this.age += 0.001;
                this.hunger += 0.04 * engine.gameSpeed;
                this.energy -= 0.02 * engine.gameSpeed;
                if (this.age > 18) this.libido += 0.03 * engine.gameSpeed;

                // Meta State Evaluation Priority Tree
                if (this.hunger > 95 || this.age > 85) {
                    this.isDead = true;
                    return;
                }

                this.evaluateDirectives(engine);
                this.executeMovement();
            }

            evaluateDirectives(engine) {
                // Priority 1: Starvation emergency loop
                if (this.hunger > 60 && this.currentTask !== 'seeking_food' && this.currentTask !== 'harvesting') {
                    this.findNearestResource(engine, 'crop', 'seeking_food');
                }
                // Priority 2: Exhaustion restoration loop
                else if (this.energy < 15 && this.currentTask !== 'sleeping') {
                    this.currentTask = 'sleeping';
                    this.targetX = Math.floor(engine.mapWidth / 2);
                    this.targetY = Math.floor(engine.mapHeight / 2);
                }
                // Priority 3: General operations execution
                else if (this.currentTask === 'idle' || Math.random() < 0.005) {
                    if (this.energy > 40) {
                        if (engine.resources.wood < engine.resources.stone) {
                            this.findNearestResource(engine, 'tree', 'gathering_wood');
                        } else if (engine.resources.stone < 100) {
                            this.findNearestResource(engine, 'stone', 'mining');
                        } else {
                            this.checkConstructionJobs(engine);
                        }
                    }
                }

                // Process Action executions when target destinations are acquired
                this.processTaskExecution(engine);
            }

            findNearestResource(engine, terrainType, taskName) {
                let closest = null;
                let minDist = Infinity;
                for (let y = 0; y < engine.mapHeight; y++) {
                    for (let x = 0; x < engine.mapWidth; x++) {
                        let t = engine.world.getTile(x, y);
                        if (t && t.terrain === terrainType && t.resourceAmount > 10) {
                            let d = Math.sqrt(Math.pow(x - this.x, 2) + Math.pow(y - this.y, 2));
                            if (d < minDist) {
                                minDist = d;
                                closest = t;
                            }
                        }
                    }
                }
                if (closest) {
                    this.currentTask = taskName;
                    this.targetX = closest.x;
                    this.targetY = closest.y;
                    this.actionTarget = closest;
                } else {
                    this.currentTask = 'idle';
                }
            }

            checkConstructionJobs(engine) {
                for (let y = 0; y < engine.mapHeight; y++) {
                    for (let x = 0; x < engine.mapWidth; x++) {
                        let t = engine.world.getTile(x, y);
                        if (t && (t.terrain === 'foundation')) {
                            this.currentTask = 'building';
                            this.targetX = x;
                            this.targetY = y;
                            this.actionTarget = t;
                            return;
                        }
                    }
                }
                // Default wander if no specialized assets found
                this.targetX = Math.max(0, Math.min(engine.mapWidth - 1, this.x + Math.floor(Math.random()*5)-2));
                this.targetY = Math.max(0, Math.min(engine.mapHeight - 1, this.y + Math.floor(Math.random()*5)-2));
                this.currentTask = 'idle';
            }

            processTaskExecution(engine) {
                let distanceToTarget = Math.sqrt(Math.pow(this.targetX - this.x, 2) + Math.pow(this.targetY - this.y, 2));
                
                if (distanceToTarget < 0.2) { // At target node
                    switch (this.currentTask) {
                        case 'seeking_food':
                        case 'harvesting':
                            if (this.actionTarget && this.actionTarget.resourceAmount > 0) {
                                this.currentTask = 'harvesting';
                                let gathered = this.actionTarget.harvest(1.5 * engine.gameSpeed);
                                engine.resources.food += gathered;
                                this.hunger = Math.max(0, this.hunger - (gathered * 2.5));
                                if (this.hunger <= 10) this.currentTask = 'idle';
                            } else { this.currentTask = 'idle'; }
                            break;

                        case 'gathering_wood':
                            if (this.actionTarget && this.actionTarget.resourceAmount > 0) {
                                let gathered = this.actionTarget.harvest(1.2 * engine.gameSpeed);
                                engine.resources.wood += gathered;
                                if (this.actionTarget.resourceAmount <= 0) this.currentTask = 'idle';
                            } else { this.currentTask = 'idle'; }
                            break;

                        case 'mining':
                            if (this.actionTarget && this.actionTarget.resourceAmount > 0) {
                                let gathered = this.actionTarget.harvest(1.0 * engine.gameSpeed);
                                engine.resources.stone += gathered;
                                if (this.actionTarget.resourceAmount <= 0) this.currentTask = 'idle';
                            } else { this.currentTask = 'idle'; }
                            break;

                        case 'building':
                            if (this.actionTarget && this.actionTarget.terrain === 'foundation') {
                                this.actionTarget.buildProgress += 0.8 * engine.gameSpeed;
                                if (this.actionTarget.buildProgress >= 100) {
                                    this.actionTarget.terrain = 'house';
                                    engine.resources.houses++;
                                    engine.beds += 3;
                                    engine.addLog(`🏗️ Structural grid asset operational at (${this.actionTarget.x}, ${this.actionTarget.y})`, 'success');
                                    this.currentTask = 'idle';
                                }
                            } else { this.currentTask = 'idle'; }
                            break;

                        case 'sleeping':
                            this.energy = Math.min(100, this.energy + 0.6 * engine.gameSpeed);
                            this.hunger += 0.01 * engine.gameSpeed; // Lower metabolism during sleep operations
                            if (this.energy >= 95) this.currentTask = 'idle';
                            break;
                    }
                }
            }

            executeMovement() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0.05) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                } else {
                    this.x = this.targetX;
                    this.y = this.targetY;
                }
            }
        }

        // ============================================
        // FAUNA SIMULATION MODULE
        // ============================================
        class WildAnimal {
            constructor(mapWidth, mapHeight) {
                this.x = Math.random() * mapWidth;
                this.y = Math.random() * mapHeight;
                this.targetX = this.x;
                this.targetY = this.y;
                this.speed = 0.02;
            }

            update(engine) {
                if (Math.random() < 0.02) {
                    this.targetX = Math.max(0, Math.min(engine.mapWidth - 1, this.x + (Math.random() * 4 - 2)));
                    this.targetY = Math.max(0, Math.min(engine.mapHeight - 1, this.y + (Math.random() * 4 - 2)));
                }
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0.05) {
                    this.x += (dx / dist) * this.speed * engine.gameSpeed;
                    this.y += (dy / dist) * this.speed * engine.gameSpeed;
                }
            }
        }

        // ============================================
        // MASTER CENTRALIZED GAME ARCHITECTURE ENGINE
        // ============================================
        class GameEngine {
            constructor() {
                this.tickCount = 0;
                this.dayCount = 1;
                this.isPaused = false;
                this.gameSpeed = 1;
                
                // Resolution mapping
                this.mapWidth = 24;
                this.mapHeight = 24;
                this.world = new WorldGenerator(this.mapWidth, this.mapHeight);
                
                this.minions = [];
                this.animals = [];
                this.minionIdCounter = 0;
                
                this.resources = { food: 450, wood: 80, stone: 60, gold: 150, houses: 0 };
                this.beds = 4;
                this.gameLog = [];

                this.initCanvas();
                this.bootstrapColony();
            }

            initCanvas() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Isometric Transform Meta Constants
                this.tileW = 64; 
                this.tileH = 32;
            }

            resizeCanvas() {
                const container = document.getElementById('canvasContainer');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }

            bootstrapColony() {
                // Initialize modern starting grid setup
                for (let i = 0; i < 4; i++) {
                    this.minions.push(new Minion(this.mapWidth/2 + (Math.random()*2-1), this.mapHeight/2 + (Math.random()*2-1), this.minionIdCounter++));
                }
                for (let i = 0; i < 8; i++) {
                    this.animals.push(new WildAnimal(this.mapWidth, this.mapHeight));
                }
                this.addLog("🌍 Sector generation initialized. Sub-orbital drop pods landed successfully.", "success");
            }

            togglePause() {
                this.isPaused = !this.isPaused;
                document.getElementById('btn-pause').classList.toggle('active', this.isPaused);
                document.getElementById('btn-pause').textContent = this.isPaused ? "RESUME" : "PAUSE";
            }

            setGameSpeed(speed) {
                this.gameSpeed = speed;
                ['speed1', 'speed2', 'speed4'].forEach(id => document.getElementById(id).classList.remove('active'));
                document.getElementById(`speed${speed}`).classList.add('active');
            }

            addLog(message, type = 'info') {
                const stamp = `[D.${this.dayCount}]`;
                this.gameLog.unshift({ message, type, stamp });
                if (this.gameLog.length > 30) this.gameLog.pop();
            }

            tryPlanHouse() {
                if (this.resources.wood >= 60 && this.resources.stone >= 40) {
                    // Search for free tile matching adjacency rules
                    for (let i = 0; i < 100; i++) {
                        let rx = Math.floor(Math.random() * (this.mapWidth - 4)) + 2;
                        let ry = Math.floor(Math.random() * (this.mapHeight - 4)) + 2;
                        let tile = this.world.getTile(rx, ry);
                        if (tile && tile.terrain === 'grass') {
                            tile.terrain = 'foundation';
                            tile.buildProgress = 0;
                            this.resources.wood -= 60;
                            this.resources.stone -= 40;
                            this.addLog(`📐 Structural blueprint mapped at vector array (${rx}, ${ry}).`, 'info');
                            return;
                        }
                    }
                }
            }

            processReproductionLoop() {
                if (this.minions.length < 2 || this.minions.length >= this.beds) return;
                
                for (let i = 0; i < this.minions.length; i++) {
                    let m1 = this.minions[i];
                    if (m1.libido < 75) continue;
                    
                    for (let j = 0; j < this.minions.length; j++) {
                        let m2 = this.minions[j];
                        if (m1.sex === m2.sex || m2.libido < 75) continue;
                        
                        let dist = Math.sqrt(Math.pow(m1.x - m2.x, 2) + Math.pow(m1.y - m2.y, 2));
                        if (dist < 1.5) {
                            // Birth implementation instantiation
                            let child = new Minion(m1.x, m1.y, this.minionIdCounter++);
                            child.age = 0; 
                            this.minions.push(child);
                            m1.libido = 0;
                            m2.libido = 0;
                            this.addLog(`👶 Vital statistics expanded: Newborn ${child.name} entered ecosystem.`, 'success');
                            return;
                        }
                    }
                }
            }

            processMarketTrading() {
                // Autonomous trade ship engine simulation
                if (this.tickCount % 500 === 0) {
                    let log = [];
                    if (this.resources.food > 600) {
                        let delta = this.resources.food - 400;
                        this.resources.gold += Math.floor(delta * 0.4);
                        this.resources.food = 400;
                        log.push(`Exported Excess Biomass (+${Math.floor(delta * 0.4)} Credits)`);
                    }
                    if (this.resources.wood < 40 && this.resources.gold >= 40) {
                        this.resources.gold -= 40;
                        this.resources.wood += 80;
                        log.push(`Imported Refined Cellulose (-40 Credits)`);
                    }
                    if (log.length > 0) {
                        this.addLog(`🛩️ Orbital Trade Link established: ${log.join(" | ")}`, 'warning');
                    }
                }
            }

            runEngineLoop() {
                if (!this.isPaused) {
                    for (let step = 0; step < this.gameSpeed; step++) {
                        this.tickCount++;
                        if (this.tickCount % 400 === 0) this.dayCount++;

                        // Engine Sub-Module ticks
                        for (let y = 0; y < this.mapHeight; y++) {
                            for (let x = 0; x < this.mapWidth; x++) {
                                this.world.tiles[y][x].update();
                            }
                        }
                        this.animals.forEach(a => a.update(this));
                        
                        this.minions.forEach((m, idx) => {
                            m.update(this);
                            if (m.isDead) this.minions.splice(idx, 1);
                        });

                        if (this.tickCount % 120 === 0) this.tryPlanHouse();
                        if (this.tickCount % 200 === 0) this.processReproductionLoop();
                        this.processMarketTrading();
                    }
                }

                this.renderIsometricScene();
                this.renderUIElements();
                requestAnimationFrame(() => this.runEngineLoop());
            }

            renderIsometricScene() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Compute centering coordinates offset projection matrices
                let offsetX = this.canvas.width / 2;
                let offsetY = this.canvas.height / 5;

                // Render isometric terrain tiles
                for (let y = 0; y < this.mapHeight; y++) {
                    for (let x = 0; x < this.mapWidth; x++) {
                        let tile = this.world.getTile(x, y);
                        
                        // Iso transform transformations
                        let isoX = (x - y) * (this.tileW / 2) + offsetX;
                        let isoY = (x + y) * (this.tileH / 2) + offsetY;

                        this.drawIsoTile(isoX, isoY, tile);
                    }
                }

                // Render Wildlife Entities
                this.animals.forEach(a => {
                    let isoX = (a.x - a.y) * (this.tileW / 2) + offsetX;
                    let isoY = (a.x + a.y) * (this.tileH / 2) + offsetY;
                    this.ctx.fillStyle = "#fbbf24";
                    this.ctx.beginPath();
                    this.ctx.arc(isoX, isoY - 6, 4, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                // Render Minion Vectors
                this.minions.forEach(m => {
                    let isoX = (m.x - m.y) * (this.tileW / 2) + offsetX;
                    let isoY = (m.x + m.y) * (this.tileH / 2) + offsetY;

                    // Neon entity base dot matrix
                    this.ctx.fillStyle = m.sex === 'M' ? '#38bdf8' : '#f472b6';
                    this.ctx.shadowColor = this.ctx.fillStyle;
                    this.ctx.shadowBlur = 8;
                    this.ctx.beginPath();
                    this.ctx.arc(isoX, isoY - 12, 5, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;

                    // Tiny indicator string tags
                    this.ctx.fillStyle = "rgba(255,255,255,0.8)";
                    this.ctx.font = "700 8px var(--font-sans)";
                    this.ctx.textAlign = "center";
                    this.ctx.fillText(m.name.split(" ")[0], isoX, isoY - 22);
                });
            }

            drawIsoTile(isoX, isoY, tile) {
                this.ctx.beginPath();
                this.ctx.moveTo(isoX, isoY);
                this.ctx.lineTo(isoX + this.tileW / 2, isoY + this.tileH / 2);
                this.ctx.lineTo(isoX, isoY + this.tileH);
                this.ctx.lineTo(isoX - this.tileW / 2, isoY + this.tileH / 2);
                this.ctx.closePath();

                // Dynamic coloring logic via rendering engine
                let fill = "#1e293b";
                let stroke = "rgba(255,255,255,0.02)";

                switch(tile.terrain) {
                    case 'grass': fill = "#14532d"; break;
                    case 'tree': fill = "#052e16"; break;
                    case 'crop': fill = "#78350f"; break;
                    case 'stone': fill = "#334155"; break;
                    case 'foundation': fill = "#1e1b4b"; stroke = varColor('accent-blue'); break;
                    case 'house': fill = "#4c1d95"; break;
                }

                this.ctx.fillStyle = fill;
                this.ctx.fill();
                this.ctx.strokeStyle = stroke;
                this.ctx.stroke();

                // Advanced 2026 vertical feature matrix projection
                if (tile.terrain === 'tree' && tile.resourceAmount > 0) {
                    this.ctx.fillStyle = "#22c55e";
                    this.ctx.fillRect(isoX - 2, isoY - 14, 4, 12);
                } else if (tile.terrain === 'crop' && tile.resourceAmount > 0) {
                    this.ctx.fillStyle = "#eab308";
                    this.ctx.fillRect(isoX - 3, isoY - 6, 6, 6);
                } else if (tile.terrain === 'house') {
                    // Build geometric wireframe housing cubes
                    this.ctx.fillStyle = "#6d28d9";
                    this.ctx.beginPath();
                    this.ctx.moveTo(isoX - 10, isoY);
                    this.ctx.lineTo(isoX + 10, isoY);
                    this.ctx.lineTo(isoX + 10, isoY - 16);
                    this.ctx.lineTo(isoX - 10, isoY - 16);
                    this.ctx.closePath();
                    this.ctx.fill();
                }
            }

            renderUIElements() {
                // Fast-updating numeric dashboard inputs
                document.getElementById('dayCounter').textContent = this.dayCount;
                document.getElementById('tickCounter').textContent = String(this.tickCount).padStart(6, '0');
                document.getElementById('populationCount').textContent = this.minions.length;
                document.getElementById('animalCount').textContent = this.animals.length;

                document.getElementById('inv-food').textContent = Math.floor(this.resources.food);
                document.getElementById('inv-wood').textContent = Math.floor(this.resources.wood);
                document.getElementById('inv-stone').textContent = Math.floor(this.resources.stone);
                document.getElementById('inv-gold').textContent = Math.floor(this.resources.gold);
                document.getElementById('inv-beds').textContent = this.beds;
                document.getElementById('inv-houses').textContent = this.resources.houses;

                // Event logs generation strings mapping
                document.getElementById('settlementLog').innerHTML = this.gameLog.map(l => 
                    `<div class="log-entry ${l.type}"><strong>${l.stamp}</strong>${l.message}</div>`
                ).join('');

                // Render complex layout vital condition parameters panels
                document.getElementById('minionStatus').innerHTML = this.minions.slice(0, 4).map(m => {
                    let hungerColor = m.hunger > 75 ? 'var(--accent-rose)' : m.hunger > 45 ? 'var(--accent-amber)' : 'var(--accent-green)';
                    let energyColor = m.energy < 25 ? 'var(--accent-rose)' : 'var(--accent-blue)';
                    return `
                        <div class="minion-card">
                            <div class="minion-header">
                                <span class="minion-identity">${m.name} (${m.sex})</span>
                                <span class="minion-task-badge">${m.currentTask.replace('_',' ')}</span>
                            </div>
                            <div class="minion-traits">Age: ${Math.floor(m.age)} cycles | Libido: ${Math.floor(m.libido)}%</div>
                            <div class="minion-stat-bar">
                                <div class="bar-labels"><span>Caloric Reserve</span><span>${Math.floor(100 - m.hunger)}%</span></div>
                                <div class="bar-container"><div class="bar-fill" style="width: ${100 - m.hunger}%; background: ${hungerColor};"></div></div>
                            </div>
                            <div class="minion-stat-bar">
                                <div class="bar-labels"><span>Cellular Battery</span><span>${Math.floor(m.energy)}%</span></div>
                                <div class="bar-container"><div class="bar-fill" style="width: ${m.energy}%; background: ${energyColor};"></div></div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(`--${name}`).strip; }

        // Start Execution Initialization System Loop Instantiation
        const game = new GameEngine();
        game.runEngineLoop();
    </script>
</body>
